name: App bug / 应用 Bug
description: Report a macOS app problem that is not specific to one website. / 报告不局限于单个网站的 macOS 应用问题。
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / 摘要
      description: What went wrong? / 发生了什么问题？
      placeholder: The task center...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      description: List the exact steps. / 请列出准确步骤。
      placeholder: |
        1. Open the app
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true
  - type: textarea
    id: support-report
    attributes:
      label: Support report / 支持报告
      description: If possible, open Diagnostics and paste the copied support report. / 如果可以，请从诊断页复制支持报告并粘贴。
      render: text
    validations:
      required: false
  - type: input
    id: macos-version
    attributes:
      label: macOS version / macOS 版本
      placeholder: macOS 15.5
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks / 确认项
      options:
        - label: I have checked the latest README and responsible-use notes. / 我已阅读最新 README 和合规使用说明。
          required: true
        - label: This is not a DRM or paywall bypass request. / 这不是 DRM 或付费墙绕过请求。
          required: true
